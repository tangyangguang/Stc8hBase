[env:STC8H1K08]
platform = intel_mcs51
board = STC8H1K08
extra_scripts = post:upload_stcgal.py
custom_stcgal_protocol = stc8g
custom_stcgal_baud = 38400
custom_stcgal_trim = 11059.2
build_flags =
    -I../../..//core
    -I../../..//hal
    -I../../..//drivers
    -I../../..//board/stc8h1k08_tssop20_demo
    -DSTC8H_CONFIG_INCLUDE=\"board_config.h\"
    -DSTC8H_PINS_INCLUDE=\"board_pins.h\"
    -DSTC8H_PWM_GROUP_MASK=0x03
    -DSTC8H_PWM_A_CHANNEL_MASK=0x01
    -DSTC8H_PWM_B_CHANNEL_MASK=0x0E
    -DDRV_EC11_ENABLE_FULL_API=0
    -DDRV_EC11_ENABLE_SMALL_API=1
    -DDRV_EC11_ENABLE_SET_FAST=0
    -DDRV_EC11_ENABLE_SET_REVERSE=0
    -DDRV_EC11_ENABLE_SET_STEPS_PER_DETENT=0
    -DSTC8H_PWM_ENABLE_DISABLE=0
    -DSTC8H_PWM_ENABLE_SET_DUTY_CHANNEL_CHECK=0
    -DSTC8H_PWM_ENABLE_SET_DUTY_CLAMP=0
    -DSTC8H_PWM_TRACK_PERIOD_PRESCALER=0
    -DDRV_EC11_ENABLE_NULL_CHECK=0

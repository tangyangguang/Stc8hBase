[platformio]
default_envs = pulse_562

[env]
platform = intel_mcs51
board = STC8H1K08
extra_scripts = post:upload_stcgal.py
custom_stcgal_protocol = stc8g
custom_stcgal_baud = 38400
custom_stcgal_trim = 11059.2
build_flags =
    -I../../..//core
    -I../../..//hal
    -I../../..//board/stc8h1k08_tssop20_demo
    -DSTC8H_CONFIG_INCLUDE=\"board_config.h\"
    -DSTC8H_PINS_INCLUDE=\"board_pins.h\"

[env:pulse_562]
build_flags =
    ${env.build_flags}
    -DDELAY_PROBE_HIGH_US=562u

[env:pulse_1687]
build_flags =
    ${env.build_flags}
    -DDELAY_PROBE_HIGH_US=1687u

[env:pulse_2250]
build_flags =
    ${env.build_flags}
    -DDELAY_PROBE_HIGH_US=2250u

[env:pulse_4500]
build_flags =
    ${env.build_flags}
    -DDELAY_PROBE_HIGH_US=4500u

[env:pulse_9000]
build_flags =
    ${env.build_flags}
    -DDELAY_PROBE_HIGH_US=9000u
